# ~/.config/kitty/kitty.conf

# =============================================================================
# Fonts
# =============================================================================
font_family      GeistMono Nerd Font Mono
bold_font        GeistMono Nerd Font Mono Bold
italic_font      GeistMono Nerd Font Mono Light
bold_italic_font GeistMono Nerd Font Mono Bold

font_size        17.3

# Nerd font symbol map
symbol_map U+E0A0-U+E0A3,U+E0B0-U+E0B3,U+E0C0-U+E0C7 GeistMono Nerd Font Mono
symbol_map U+F000-U+F2E0 GeistMono Nerd Font Mono
symbol_map U+2600-U+26FF GeistMono Nerd Font Mono

# Disable ligatures (set to 'always' if you want them)
font_features GeistMonoNerdFontMono-Regular -liga -calt

# =============================================================================
# Cursor
# =============================================================================
cursor_shape           beam
cursor_blink_interval  0
cursor_stop_blinking_after 0

# =============================================================================
# Scrollback
# =============================================================================
scrollback_lines       10000
wheel_scroll_multiplier 5.0

# =============================================================================
# Mouse
# =============================================================================
mouse_hide_wait        2.0
copy_on_select         no
focus_follows_mouse    no

# =============================================================================
# Performance
# =============================================================================
repaint_delay    8
input_delay      1
sync_to_monitor  no

# =============================================================================
# Window
# =============================================================================
window_padding_width     8
placement_strategy       center
hide_window_decorations  yes
remember_window_size     yes

confirm_os_window_close  0

# =============================================================================
# Tabs
# =============================================================================
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       1

tab_title_template     "{index}: {tab.active_wd.split('/')[-1]}"

active_tab_font_style   bold
inactive_tab_font_style normal

# =============================================================================
# Color scheme (Tokyo Night — pairs well with common nvim themes)
# =============================================================================
background              #1a1b26
foreground              #c0caf5

selection_background    #283457
selection_foreground    #c0caf5

cursor                  #c0caf5
cursor_text_color       #1a1b26

# Black
color0  #15161e
color8  #414868

# Red
color1  #f7768e
color9  #f7768e

# Green
color2  #9ece6a
color10 #9ece6a

# Yellow
color3  #e0af68
color11 #e0af68

# Blue
color4  #7aa2f7
color12 #7aa2f7

# Magenta
color5  #bb9af7
color13 #bb9af7

# Cyan
color6  #7dcfff
color14 #7dcfff

# White
color7  #a9b1d6
color15 #c0caf5

# =============================================================================
# Keyboard shortcuts
# =============================================================================
# Clear defaults
clear_all_shortcuts no

# Tabs
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+q    close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+1     goto_tab 1
map ctrl+shift+2     goto_tab 2
map ctrl+shift+3     goto_tab 3
map ctrl+shift+4     goto_tab 4
map ctrl+shift+5     goto_tab 5
map ctrl+shift+alt+t set_tab_title

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Clipboard
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard

# Scrollback
map ctrl+shift+up    scroll_line_up
map ctrl+shift+down  scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Reload config
map ctrl+shift+f5    load_config_file
