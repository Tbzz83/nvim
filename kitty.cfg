# ~/.config/kitty/kitty.conf
term xterm-256color

# Makes the surrounding window dark
linux_display_server x11 

# =============================================================================
# Fonts
# =============================================================================
font_family      GeistMono Nerd Font Mono
bold_font        GeistMono Nerd Font Mono Bold
italic_font      GeistMono Nerd Font Mono Light
bold_italic_font GeistMono Nerd Font Mono Bold

font_size        17.3

# Nerd font symbol map
symbol_map U+E0A0-U+E0A3,U+E0B0-U+E0B3,U+E0C0-U+E0C7 GeistMono Nerd Font Mono
symbol_map U+F000-U+F2E0 GeistMono Nerd Font Mono
symbol_map U+2600-U+26FF GeistMono Nerd Font Mono

# Disable ligatures (set to 'always' if you want them)
font_features GeistMonoNerdFontMono-Regular -liga -calt

# =============================================================================
# Cursor
# =============================================================================
cursor_shape           beam
cursor_blink_interval  0
cursor_stop_blinking_after 0

# =============================================================================
# Scrollback
# =============================================================================
scrollback_lines       10000
wheel_scroll_multiplier 5.0

# =============================================================================
# Mouse
# =============================================================================
mouse_hide_wait        2.0
copy_on_select         no
focus_follows_mouse    no

# =============================================================================
# Performance
# =============================================================================
repaint_delay    8
input_delay      1
sync_to_monitor  no

# =============================================================================
# Window
# =============================================================================
window_padding_width     8
placement_strategy       center
hide_window_decorations  no
remember_window_size     yes

confirm_os_window_close  0

# =============================================================================
# Tabs
# =============================================================================
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       1

tab_title_template     "{index}: {tab.active_wd.split('/')[-1]}"

active_tab_font_style   bold
inactive_tab_font_style normal

# =============================================================================
# Color scheme
# =============================================================================
# vim:ft=kitty

## name:     Catppuccin Kitty Mocha
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/mocha.conf
## blurb:    Soothing pastel theme for the high-spirited!



# The basic colors
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor colors
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# Scrollbar colors
scrollbar_handle_color  #9399b2
scrollbar_track_color   #45475a

# URL color when hovering with mouse
url_color               #f5e0dc

# Kitty window border colors
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Colors for marks (marked text in the terminal)
mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

# The 16 terminal colors

# black
color0 #45475a
color8 #585b70

# red
color1 #f38ba8
color9 #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #f5c2e7
color13 #f5c2e7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8
# =============================================================================
# Keyboard shortcuts
# =============================================================================
# Clear defaults
clear_all_shortcuts no

# Tabs
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+q    close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab
map ctrl+shift+1     goto_tab 1
map ctrl+shift+2     goto_tab 2
map ctrl+shift+3     goto_tab 3
map ctrl+shift+4     goto_tab 4
map ctrl+shift+5     goto_tab 5
map ctrl+shift+alt+t set_tab_title

# Font size
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# Clipboard
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard

# Scrollback
map ctrl+shift+up    scroll_line_up
map ctrl+shift+down  scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down

# Reload config
map ctrl+shift+f5    load_config_file
